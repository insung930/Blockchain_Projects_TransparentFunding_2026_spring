services:
  postgres:
    image: postgres:16-alpine
    container_name: transparent-crowdfund-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: crowd
      POSTGRES_PASSWORD: crowdpass
      POSTGRES_DB: crowdfund
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
volumes:
  postgres_data:
